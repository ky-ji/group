name: Sync to MMLab SIGS Groups

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-mmlab-groups.yml'
      - 'content/**'
      - 'content_zh/**'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mmlab-sigs-groups-deploy
  cancel-in-progress: true

env:
  TARGET_REPOSITORY: mmlab-sigs/groups
  TARGET_DIRECTORY: efficient-deep-learning-and-embodiment-group

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TOKEN: ${{ secrets.MMLAB_SIGS_GROUPS_TOKEN }}

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site for MMLab SIGS
        run: npm run build:mmlab-group

      - name: Validate deployment token
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "::error::Missing repository secret MMLAB_SIGS_GROUPS_TOKEN."
            exit 1
          fi

          git ls-remote "https://x-access-token:${DEPLOY_TOKEN}@github.com/${TARGET_REPOSITORY}.git" HEAD >/dev/null

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: main
          token: ${{ env.DEPLOY_TOKEN }}
          path: target-repo

      - name: Sync generated files
        run: rsync -a --delete out/ "target-repo/${TARGET_DIRECTORY}/"

      - name: Commit and push changes
        working-directory: target-repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${TARGET_DIRECTORY}"

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy ${TARGET_DIRECTORY} site"
          git push "https://x-access-token:${DEPLOY_TOKEN}@github.com/${TARGET_REPOSITORY}.git" HEAD:main
